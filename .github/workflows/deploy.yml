# TITULO: WORKFLOW DE DESPLIEGUE AUTOMÁTICO (CI/CD)
name: Deploy Simulacro to AWS

on:
  push:
    branches:
      - main  # Se dispara cada vez que subes cambios a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Control de código (Checkout)
        uses: actions/checkout@v3

      - name: Desplegar archivos en el servidor AWS mediante SSH
        uses: appleboy/scp-action@master
        with:
          host: 52.212.109.61
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}  # Usa el secreto que ya tienes global en tu cuenta
          source: "index.html,style.css,script.js"
          # ⚠️ IMPORTANTE: Aquí pones la ruta de la carpeta de tu servidor donde quieras que se guarde.
          # Por ejemplo, si quieres que se guarde en una subcarpeta de tu portfolio:
          target: "/home/ubuntu/simulacro" # 🎯 Destino directo a la carpeta independiente del simulacro
